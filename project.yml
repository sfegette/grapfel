name: grapfel
options:
  bundleIdPrefix: com.brilliantmindworks
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_HARDENED_RUNTIME: YES
    MARKETING_VERSION: "0.1.3"
    CURRENT_PROJECT_VERSION: "3"
    PRODUCT_BUNDLE_IDENTIFIER: com.brilliantmindworks.grapfel
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    INFOPLIST_FILE: grapfel/Resources/Info.plist
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: MX6K4V7DP6
  configs:
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Developer ID Application"
      PROVISIONING_PROFILE_SPECIFIER: ""
      OTHER_CODE_SIGN_FLAGS: "--timestamp"
      CODE_SIGN_ENTITLEMENTS: grapfel/grapfel-dist.entitlements

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  grapfel:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - grapfel
    resources:
      - grapfel/Resources/Assets.xcassets
      - grapfel/Resources/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brilliantmindworks.grapfel
        INFOPLIST_FILE: grapfel/Resources/Info.plist
        ENTITLEMENTS_FILE: grapfel/grapfel.entitlements
        CODE_SIGN_ENTITLEMENTS: grapfel/grapfel.entitlements
      configs:
        Release:
          CODE_SIGN_ENTITLEMENTS: grapfel/grapfel-dist.entitlements
          ENTITLEMENTS_FILE: grapfel/grapfel-dist.entitlements
    entitlements:
      path: grapfel/grapfel.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
    dependencies:
      - package: Sparkle
        product: Sparkle
    scheme:
      testTargets:
        - grapfelTests
        - grapfelUITests

  grapfelTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - grapfelTests
      - grapfel/Models/ApfelOptions.swift
      - grapfel/Models/ChatMessage.swift
      - grapfel/Models/GlobalHotKey.swift
      - grapfel/Models/MarkdownSegmenter.swift
      - grapfel/Services/ApfelAPIClient.swift
      - grapfel/Services/ApfelServerManager.swift
      - grapfel/Services/ConversationExporter.swift
      - grapfel/Services/ConversationStore.swift
      - grapfel/Services/ConversationTitleFormatter.swift
      - grapfel/Services/SetupChecker.swift
      - grapfel/ViewModels/ChatViewModel.swift
    settings:
      base:
        TEST_HOST: ""
        BUNDLE_LOADER: ""

  grapfelUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - grapfelUITests
    dependencies:
      - target: grapfel

schemes:
  grapfel:
    build:
      targets:
        grapfel: all
        grapfelTests: [test]
        grapfelUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - grapfelTests
        - grapfelUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
