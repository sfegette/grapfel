name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — skips release.sh, just tests runner is alive'
        type: boolean
        default: true

permissions:
  contents: write
  issues: write

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: [self-hosted, macOS]
    timeout-minutes: 30

    outputs:
      version: ${{ steps.meta.outputs.version }}
      raw_notes: ${{ steps.meta.outputs.raw_notes }}

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unlock keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" ~/Library/Keychains/login.keychain-db
          security set-keychain-settings -t 3600 ~/Library/Keychains/login.keychain-db

      - name: Install xcpretty
        run: gem list xcpretty -i &>/dev/null || gem install xcpretty --no-document 2>/dev/null || true

      - name: Build and release
        env:
          TRACKER_API_TOKEN: ${{ secrets.TRACKER_API_TOKEN }}
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "Dry run — skipping release.sh"
          else
            bash scripts/release.sh --no-tag
          fi

      - name: Extract release metadata
        id: meta
        if: inputs.dry_run != 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(git log --oneline \
            "$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD" \
            2>/dev/null \
            | grep -vE "^[a-f0-9]+ (chore|ci:|docs:)" \
            | head -10 \
            | sed 's/^[a-f0-9]* //' \
            || echo "bug fixes and improvements")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          {
            echo "raw_notes<<NOTES_EOF"
            echo "$NOTES"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

  format-and-dispatch:
    needs: release
    if: >-
      needs.release.result == 'success' &&
      (github.event_name == 'push' || inputs.dry_run != 'true')
    uses: ./.github/workflows/agent-dispatch.yml
    with:
      subagent: format-release-notes
      app: grapfel
      version: ${{ needs.release.outputs.version }}
      raw_notes: ${{ needs.release.outputs.raw_notes }}
    secrets: inherit
